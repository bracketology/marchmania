<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
text-align:center;
}
.navbar{
background:#222;
padding:12px;
display:flex;
justify-content:center;
gap:25px;
}
.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:white;
padding:20px;
margin-top:25px;
border-radius:8px;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
}
th{
cursor:pointer;
background:#f2f2f2;
}
.entryLink{
color:#0066cc;
text-decoration:none;
font-weight:bold;
}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="scenarios.html">Scenarios</a>
</div>

<div class="container">
<h1>Leaderboard</h1>

<div class="card">
<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Entry</th>
<th>Points</th>
  <th>tiebreaker</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
async function loadLeaderboard(){

  // RESULTS
  const resultsRes = await fetch("results.json");
  const results = await resultsRes.json();

  // ENTRIES (FIXED FETCH)
  const entriesRes = await fetch("https://script.google.com/macros/s/AKfycbxFl2X-PoaGAngDB8NGtPT20mnS15KK47MDTDSD_-n6SnB32CnCxEZWoTi8hl_uiHbE/exec");
  const entries = await entriesRes.json();

  let leaderboard = [];

  const actualTiebreaker = parseInt(results.tiebreaker) || 0;

  // ROUND POINTS
  function getRoundPoints(gameNum){
    if(gameNum <= 32) return 1;
    if(gameNum <= 48) return 2;
    if(gameNum <= 56) return 4;
    if(gameNum <= 60) return 8;
    if(gameNum <= 62) return 12;
    return 16;
  }

  // SEED BONUS
  function getSeedBonus(seed){
    if(seed === 9 || seed === 10) return 1;
    if(seed === 11 || seed === 12) return 2;
    if(seed === 13 || seed === 14) return 3;
    if(seed === 15) return 4;
    if(seed === 16) return 5;
    return 0;
  }

  // CALCULATE SCORES
  entries.forEach(entry => {
    let score = 0;

    for(let game in entry.picks){
      if(results[game] && results[game] === entry.picks[game]){

        let gameNum = parseInt(game.replace("g",""));
        let basePoints = getRoundPoints(gameNum);

        let seed = parseInt(entry.picks[game].split(" ")[0]) || 0;
        let bonus = getSeedBonus(seed);

        score += basePoints + bonus;
      }
    }

    // TIEBREAKER
    let entryTB = parseInt(entry.tiebreaker) || 0;
    let diff = Math.abs(entryTB - actualTiebreaker);

    leaderboard.push({
      name: entry.name,
      points: score,
       tiebreaker: entryTB,
      diff: diff
    });
  });

  // SORT (points first, then tiebreaker)
  leaderboard.sort((a,b) => {
    if (b.points !== a.points) {
      return b.points - a.points;
    }
    return a.diff - b.diff;
  });

  // RENDER
  const tbody = document.querySelector("#leaderboard tbody");
  tbody.innerHTML = "";

  leaderboard.forEach((entry, index) => {
    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${index + 1}</td>
      <td>
        <a class="entryLink" href="bracket.html?name=${encodeURIComponent(entry.name)}">
          ${entry.name}
        </a>
      </td>
      <td>${entry.points}</td>
<td>${entry.tiebreaker}</td>
    `;

    tbody.appendChild(row);
  });
}

loadLeaderboard();
</script>

</body>
</html>
