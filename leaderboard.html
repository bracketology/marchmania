<script>

/* RANK MOVEMENT */

let ranks = document.querySelectorAll(".rank")

ranks.forEach(function(cell){

let current = parseInt(cell.innerText)
let previous = parseInt(cell.dataset.prev)

let diff = previous - current

let indicator = document.createElement("span")
indicator.classList.add("rankMove")

if(diff > 0){

indicator.classList.add("up")
indicator.innerText = " ▲ +" + diff

}

else if(diff < 0){

indicator.classList.add("down")
indicator.innerText = " ▼ " + diff

}

else{

indicator.classList.add("same")
indicator.innerText = " –"

}

cell.appendChild(indicator)

})

/* SORT TABLE */

let sortDirection = true

function sortTable(column){

let table = document.getElementById("leaderboard")
let rows = Array.from(table.rows).slice(1)

sortDirection = !sortDirection

rows.sort(function(a,b){

let x = a.cells[column].innerText.toLowerCase()
let y = b.cells[column].innerText.toLowerCase()

if(!isNaN(x) && !isNaN(y)){
return sortDirection ? x - y : y - x
}

return sortDirection ? x.localeCompare(y) : y.localeCompare(x)

})

rows.forEach(row => table.tBodies[0].appendChild(row))

}

</script>

<script>

async function loadResults(){

const response = await fetch("results.json");
const results = await response.json();

document.querySelectorAll(".matchup").forEach(game => {

const gameId = game.dataset.game;
const winner = results[gameId];

if(!winner) return;

const teams = game.querySelectorAll(".team");

teams.forEach(team => {

if(team.innerText === winner){
team.classList.add("winner");
}else{
team.classList.add("loser");
team.classList.add("busted");
}

});

});

}

loadResults();

</script>
