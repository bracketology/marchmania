<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
text-align:center;
}
.navbar{
background:#222;
padding:12px;
display:flex;
justify-content:center;
gap:25px;
}
.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:white;
padding:20px;
margin-top:25px;
border-radius:8px;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
}
th{
cursor:pointer;
background:#f2f2f2;
}
.entryLink{
color:#0066cc;
text-decoration:none;
font-weight:bold;
}
.up{color:green;}
.down{color:red;}
.same{color:gray;}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="scenarios.html">Scenarios</a>
</div>

<div class="container">
<h1>Leaderboard</h1>

<div class="card">
<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Entry</th>
<th>Points</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script>

async function loadLeaderboard(){

const resultsRes = await fetch("results.json");
const results = await resultsRes.json();

const entriesRes = await fetch("const entriesRes = await fetch("https://script.google.com/macros/s/AKfycbxFl2X-PoaGAngDB8NGtPT20mnS15KK47MDTDSD_-n6SnB32CnCxEZWoTi8hl_uiHbE/exec");");
const entries = await entriesRes.json();

let leaderboard = [];

entries.forEach(entry => {

let score = 0;

for(let game in entry.picks){
if(results[game] && results[game] === entry.picks[game]){
score += 1; // simple scoring (we can upgrade later)
}
}

leaderboard.push({
name: entry.name,
points: score
});

});

// SORT BY POINTS
leaderboard.sort((a,b) => b.points - a.points);

// RENDER
const tbody = document.querySelector("#leaderboard tbody");
tbody.innerHTML = "";

leaderboard.forEach((entry, index) => {

let row = document.createElement("tr");

row.innerHTML = `
<td>${index + 1}</td>
<td><a class="entryLink" href="bracket.html?name=${encodeURIComponent(entry.name)}">${entry.name}</a></td>
<td>${entry.points}</td>
`;

tbody.appendChild(row);

});

}

loadLeaderboard();

</script>

</body>
</html>
