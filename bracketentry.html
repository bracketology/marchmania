<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>March Madness Pool</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
min-width:1700px;
}

.bracket{
display:grid;
grid-template-columns:1fr 350px 1fr;
gap:80px;
padding:40px;
}

.region{
display:flex;
gap:20px;
}

.round{
display:flex;
flex-direction:column;
justify-content:space-between;
}

.game{
background:white;
border:1px solid #ccc;
padding:5px;
width:150px;
}

.team{
cursor:pointer;
padding:3px;
}

.team:hover{background:#eee;}

.selected{
background:#4CAF50;
color:white;
}

.slot{
background:white;
border:1px solid #ccc;
width:150px;
height:24px;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.entry-form{
background:white;
padding:20px;
border:1px solid #ccc;
width:320px;
margin:40px auto;
border-radius:6px;
}

input{
width:90%;
padding:8px;
margin:6px 0;
}

button{
padding:10px 18px;
margin:6px;
cursor:pointer;
border:none;
border-radius:4px;
}

.submit{background:#4CAF50;color:white;}
.reset{background:#777;color:white;}
</style>

<script>
async function submitBracket(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let tiebreaker = document.getElementById("tiebreaker").value;

if(!name){
alert("Enter your name!");
return;
}

let picks = {};
let gameCounter = 1;

document.querySelectorAll(".game").forEach(game=>{
let selected = game.querySelector(".selected");
if(selected){
picks["g"+gameCounter] = selected.innerText;
}
gameCounter++;
});

document.querySelectorAll(".slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText;
}
gameCounter++;
});

try{
await fetch("https://script.google.com/macros/s/AKfycbwJ8v5d0M8oKTmVzSeAIZNkhVRJbqlzpMZu25UmLzt5g9rNBUCfz57ZGIKaXzot44Ue/exec",{
method:"POST",
body:JSON.stringify({name,phone,email,tiebreaker,picks}),
headers:{"Content-Type":"application/json"}
});
alert("✅ Submitted!");
}catch(e){
alert("❌ Error submitting");
}

}

function selectTeam(el){
let siblings = el.parentNode.querySelectorAll(".team");
siblings.forEach(t=>t.classList.remove("selected"));
el.classList.add("selected");
}
</script>

</head>

<body>

<h1>March Madness Pool</h1>

<div class="bracket">

<div class="region">
<div class="round">
<div class="game">
<div class="team" onclick="selectTeam(this)">1 Duke</div>
<div class="team" onclick="selectTeam(this)">16 Siena</div>
</div>

<div class="game">
<div class="team" onclick="selectTeam(this)">8 Ohio St</div>
<div class="team" onclick="selectTeam(this)">9 TCU</div>
</div>
</div>
</div>

<div class="center">
<h3>Champion</h3>
<div class="slot" id="champion"></div>

<input id="tiebreaker" placeholder="Total points">

<button class="submit" onclick="submitBracket()">Submit</button>
</div>

</div>

<hr>

<div class="entry-form">
<input id="name" placeholder="Full Name"><br>
<input id="phone" placeholder="Phone Number"><br>
<input id="email" placeholder="Email Address"><br>
</div>

</body>
</html>
