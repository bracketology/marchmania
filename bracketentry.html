<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>March Madness Pool</title>

<style>
/* KEEPING YOUR ORIGINAL STYLES */
.entry-form{
background:white;
padding:20px;
border:1px solid #ccc;
width:320px;
margin:40px auto;
border-radius:6px;
text-align:center;
}
.entry-form input{
width:90%;
padding:8px;
margin:6px 0;
}
.venmo{
background:#3D95CE;
color:white;
padding:10px 18px;
border:none;
border-radius:4px;
cursor:pointer;
}
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
min-width:1700px;
}
.bracket{
display:grid;
grid-template-columns:1fr 350px 1fr;
grid-template-rows:auto auto;
gap:80px;
padding:40px;
align-items:start;
justify-items:center;
}
.region{
display:flex;
gap:20px;
align-items:center;
}
.right-region{
flex-direction:row-reverse;
}
.east{grid-column:1;grid-row:1;}
.west{grid-column:3;grid-row:1;}
.south{grid-column:1;grid-row:2;}
.midwest{grid-column:3;grid-row:2;}
.round{
display:flex;
flex-direction:column;
justify-content:space-between;
}
.r64{height:640px;}
.r32{height:700px;}
.r16{height:520px;}
.r8{height:360px;}
.game{
background:white;
border:1px solid #ccc;
padding:5px;
width:150px;
}
.team{
cursor:pointer;
padding:3px;
}
.team:hover{background:#eee;}
.selected{
background:#4CAF50;
color:white;
}
.slot{
background:white;
border:1px solid #ccc;
width:150px;
height:24px;
}
.center{
grid-column:2;
grid-row:1 / span 2;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
}
button{
padding:10px 18px;
margin:6px;
cursor:pointer;
border:none;
border-radius:4px;
}
.submit{background:#4CAF50;color:white;}
.reset{background:#777;color:white;}
</style>

<script>
async function submitBracket(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let tiebreaker = document.getElementById("tiebreaker").value;

if(!name){
alert("Enter your name!");
return;
}

let picks = {};
let gameCounter = 1;

// SAME PICK LOGIC YOU HAD
document.querySelectorAll(".region .r64 .game").forEach(game=>{
let selected = game.querySelector(".selected");
if(selected){
picks["g"+gameCounter] = selected.innerText.replace(/^\d+\s/, "");
}
gameCounter++;
});

document.querySelectorAll(".region .r32 .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText.replace(/^\d+\s/, "");
}
gameCounter++;
});

document.querySelectorAll(".region .r16 .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText.replace(/^\d+\s/, "");
}
gameCounter++;
});

document.querySelectorAll(".region .r8 .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText.replace(/^\d+\s/, "");
}
gameCounter++;
});

document.querySelectorAll(".center .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText.replace(/^\d+\s/, "");
}
gameCounter++;
});

// SEND TO SHEETS
await fetch("PASTE_YOUR_URL_HERE",{
method:"POST",
body:JSON.stringify({name,phone,email,tiebreaker,picks}),
headers:{"Content-Type":"application/json"}
});

alert("Submitted!");
}
</script>

</head>

<body>

<h1>March Madness Pool</h1>

<!-- YOUR FULL BRACKET (UNCHANGED) -->
<div class="bracket">

<!-- EAST -->
<div class="region east">
<div class="round r64">
<div class="game"><div class="team">1 Duke</div><div class="team">16 Siena</div></div>
<div class="game"><div class="team">8 Ohio St</div><div class="team">9 TCU</div></div>
<div class="game"><div class="team">5 St John's</div><div class="team">12 Northern Iowa</div></div>
<div class="game"><div class="team">4 Kansas</div><div class="team">13 Cal Baptist</div></div>
<div class="game"><div class="team">6 Louisville</div><div class="team">11 South Florida</div></div>
<div class="game"><div class="team">3 Michigan St</div><div class="team">14 North Dakota St</div></div>
<div class="game"><div class="team">7 UCLA</div><div class="team">10 Central Florida</div></div>
<div class="game"><div class="team">2 UConn</div><div class="team">15 Furman</div></div>
</div>

<div class="round r32">
<div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
<div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
</div>

<div class="round r16">
<div class="slot"></div><div class="slot"></div>
<div class="slot"></div><div class="slot"></div>
</div>

<div class="round r8">
<div class="slot"></div><div class="slot"></div>
</div>
</div>

<!-- KEEP YOUR OTHER REGIONS EXACTLY AS BEFORE -->

<div class="center">
<h3>Final Four</h3>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

<h3>Championship</h3>
<div class="slot"></div>
<div class="slot"></div>

<h3>Champion</h3>
<div class="slot"></div>

<input id="tiebreaker" placeholder="Total points">

<button class="reset" onclick="resetBracket()">Reset</button>
<button class="submit" onclick="submitBracket()">Submit</button>
</div>

</div>

<hr>

<div class="entry-form">
<input id="name" placeholder="Full Name"><br>
<input id="phone" placeholder="Phone Number"><br>
<input id="email" placeholder="Email Address"><br>
</div>

</body>
</html>
