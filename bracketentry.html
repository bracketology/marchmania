<script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

let locked = false;
let locked = false; // ✅ NEW

function clearFuture(rounds, startIndex){
for(let i=startIndex;i<rounds.length;i++){
rounds[i].querySelectorAll(".slot").forEach(s=>s.innerText="")
}
}

function setupRegion(region, regionIndex){
const rounds = region.querySelectorAll(".round")
const r64 = rounds[0].querySelectorAll(".game")
const r32 = rounds[1].querySelectorAll(".slot")
const r16 = rounds[2].querySelectorAll(".slot")
const r8  = rounds[3].querySelectorAll(".slot")

r64.forEach((game,gameIndex)=>{
const teams = game.querySelectorAll(".team")
teams.forEach(team=>{
team.addEventListener("click",function(){
if(locked) return; // ✅ LOCK

teams.forEach(t=>t.classList.remove("selected"))
this.classList.add("selected")

r32[gameIndex].innerText = this.innerText

clearFuture(rounds,1) // ✅ CLEAR DOWNSTREAM
})
})
})

r32.forEach((slot,index)=>{
slot.addEventListener("click",function(){
if(locked) return;
if(!this.innerText) return

r16[Math.floor(index/2)].innerText = this.innerText
clearFuture(rounds,2)
})
})

r16.forEach((slot,index)=>{
slot.addEventListener("click",function(){
if(locked) return;
if(!this.innerText) return

r8[Math.floor(index/2)].innerText = this.innerText
clearFuture(rounds,3)
})
})

r8.forEach((slot)=>{
slot.addEventListener("click",function(){
if(locked) return;
if(!this.innerText) return

const centerSlots = document.querySelectorAll(".center .slot")

centerSlots[regionIndex].innerText = this.innerText

// clear downstream correctly
centerSlots[4].innerText = ""
centerSlots[5].innerText = ""
centerSlots[6].innerText = ""
})
})
}

document.querySelectorAll(".region").forEach((region, index)=>{
setupRegion(region, index)
})

const centerSlots = document.querySelectorAll(".center .slot")
const finalFour = [centerSlots[0],centerSlots[1],centerSlots[2],centerSlots[3]]
const championship = [centerSlots[4],centerSlots[5]]
const champion = centerSlots[6]

finalFour.forEach((slot,index)=>{
slot.addEventListener("click",function(){
if(locked) return;
if(!this.innerText) return

championship[Math.floor(index/2)].innerText = this.innerText

champion.innerText = "" // ✅ CLEAR
})
})

championship.forEach((slot)=>{
slot.addEventListener("click",function(){
if(locked) return;
if(!this.innerText) return

champion.innerText = this.innerText
})
})

function resetBracket(){
if(locked) return; // optional safety
document.querySelectorAll(".team").forEach(t=>t.classList.remove("selected"))
document.querySelectorAll(".slot").forEach(s=>s.innerText="")
}

async function submitBracket(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let tiebreaker = document.getElementById("tiebreaker").value;

if(!name || !email){
alert("Enter name and email");
return;
}

let picks = {};
let gameCounter = 1;

document.querySelectorAll(".region .r64 .game").forEach(game=>{
let selected = game.querySelector(".selected");
if(selected){
picks["g"+gameCounter] = selected.innerText.replace(/^\d+\s/, "");
}
gameCounter++;
});

document.querySelectorAll(".region .r32 .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText;
}
gameCounter++;
});

document.querySelectorAll(".region .r16 .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText;
}
gameCounter++;
});

document.querySelectorAll(".region .r8 .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText;
}
gameCounter++;
});

document.querySelectorAll(".center .slot").forEach(slot=>{
if(slot.innerText){
picks["g"+gameCounter] = slot.innerText;
}
gameCounter++;
});
// ✅ make sure bracket is complete
if(Object.keys(picks).length !== 63){
  alert("Finish your bracket before submitting");
  return;
}
  
try {
let res = await fetch("https://script.google.com/macros/s/AKfycbxFl2X-PoaGAngDB8NGtPT20mnS15KK47MDTDSD_-n6SnB32CnCxEZWoTi8hl_uiHbE/exec", {
method: "POST",
body: JSON.stringify({name,phone,email,tiebreaker,picks}),
headers: {"Content-Type": "application/json"}
});

let result = JSON.parse(await res.text());

if(result.status === "closed"){
alert("Submissions are closed.");
return;
}

if(result.status === "limit"){
alert("You already submitted 5 entries.");
return;
}

locked = true; // ✅ LOCK AFTER SUBMIT
alert("Submitted! Check your email.");

} catch (err) {
alert("Error submitting");
console.error(err);
}
}
  });
