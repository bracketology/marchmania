<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Scenarios</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
text-align:center;
}
.navbar{
background:#222;
padding:12px;
display:flex;
justify-content:center;
gap:25px;
}
.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}
h1{
margin-top:25px;
}
.container{
max-width:1400px;
margin:auto;
padding:20px;
}
table{
width:100%;
border-collapse:collapse;
background:white;
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
}
th{
background:#333;
color:white;
cursor:pointer;
}
.rank{
font-weight:bold;
}
.alive{
color:green;
font-weight:bold;
}
.eliminated{
color:red;
font-weight:bold;
}
.update{
margin-top:15px;
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="bracket.html">Bracket</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="rules.html">Rules</a>
<a href="scenarios.html">Scenarios</a>
</div>

<h1>Player Scenarios</h1>

<div class="container">
<table id="scenarioTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Current Points</th>
<th>Total Possible</th>
<th>Best Finish</th>
<th>Champion Pick</th>
<th>Still Alive</th>
<th>Teams To Root For</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="update">
Last Updated: <span id="timestamp"></span>
</div>
</div>

<script>

// ROUND POINTS
function getRoundPoints(gameId){
let num = parseInt(gameId.replace("g",""));

if(num <= 32) return 1;
if(num <= 48) return 2;
if(num <= 56) return 4;
if(num <= 60) return 8;
if(num <= 62) return 12;
return 16;
}

// SEED BONUS
function getSeedBonus(seed){
if(seed === 9 || seed === 10) return 1;
if(seed === 11 || seed === 12) return 2;
if(seed === 13 || seed === 14) return 3;
if(seed === 15) return 4;
if(seed === 16) return 5;
return 0;
}

// ORDINAL
function ordinal(n){
if(n===1) return "1st";
if(n===2) return "2nd";
if(n===3) return "3rd";
return n + "th";
}

async function loadScenarios(){

const results = await (await fetch("results.json")).json();
const entries = await (await fetch("entries.json")).json();
const seeds = await (await fetch("seeds.json")).json();

let players = [];

// CALCULATE SCORES
entries.forEach(entry => {

let current = 0;
let max = 0;
let alive = false;
let rootFor = new Set();

for(let game in entry.picks){

let pick = entry.picks[game];
let winner = results[game];

// CURRENT SCORE
if(winner && pick === winner){
current += getRoundPoints(game);
let seed = seeds[winner];
if(seed) current += getSeedBonus(seed);
}

// MAX POSSIBLE + ROOTING LOGIC
if(!winner){
max += getRoundPoints(game);
let seed = seeds[pick];
if(seed) max += getSeedBonus(seed);

alive = true;

// THIS TEAM HELPS THEM
rootFor.add(pick);
}
else if(pick === winner){
max += getRoundPoints(game);
let seed = seeds[winner];
if(seed) max += getSeedBonus(seed);

alive = true;
}
else{
// their pick lost → root against winner
rootFor.add("Against " + winner);
}

}

let championPick = entry.picks["g63"] || "";

players.push({
name: entry.name,
current: current,
max: max,
champion: championPick,
alive: alive,
rootFor: Array.from(rootFor)
});

});

// SORT BY CURRENT
players.sort((a,b) => b.current - a.current);

// ASSIGN RANK
players.forEach((p,i)=> p.rank = i+1);

// BEST FINISH
players.forEach(player => {

let better = 0;

players.forEach(other => {
if(other !== player){
if(other.current > player.max){
better++;
}
}
});

player.bestFinish = better + 1;

});

// RENDER
const tbody = document.querySelector("#scenarioTable tbody");
tbody.innerHTML = "";

players.forEach(p => {

let row = document.createElement("tr");

row.innerHTML = `
<td class="rank">${p.rank}</td>
<td>${p.name}</td>
<td>${p.current}</td>
<td>${p.max}</td>
<td>${ordinal(p.bestFinish)}</td>
<td>${p.champion}</td>
<td class="${p.alive ? 'alive' : 'eliminated'}">
${p.alive ? 'YES' : 'NO'}
</td>
<td style="font-size:12px">${p.rootFor.join(", ")}</td>
`;

tbody.appendChild(row);

});

// TIMESTAMP
document.getElementById("timestamp").innerText =
new Date().toLocaleString();

}

loadScenarios();

</script>

</body>
</html>
