<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Scenarios</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
text-align:center;
}
.navbar{
background:#222;
padding:12px;
display:flex;
justify-content:center;
gap:25px;
}
.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}
h1{
margin-top:25px;
}
.container{
max-width:1400px;
margin:auto;
padding:20px;
}
table{
width:100%;
border-collapse:collapse;
background:white;
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
}
th{
background:#333;
color:white;
cursor:pointer;
}
.rank{
font-weight:bold;
}
.alive{
color:green;
font-weight:bold;
}
.eliminated{
color:red;
font-weight:bold;
}
.update{
margin-top:15px;
font-size:14px;
color:#666;
}
</style>
</head>
<body>
<div class="navbar">
<a href="index.html">Home</a>
<a href="bracket.html">Bracket</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="rules.html">Rules</a>
<a href="scenarios.html">Scenarios</a>
<a href="champions.html">Champions</a>
</div>
<h1>Player Scenarios</h1>
<div class="container">
<table id="scenarioTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Current Points</th>
<th>Total Possible</th>
<th>Best Finish</th>
<th>Champion Pick</th>
<th>Still Alive</th>
<th>Teams To Root For</th>
</tr>
</thead>
<tbody></tbody>
</table>
<div class="update">
Last Updated: <span id="timestamp"></span>
</div>
</div>
<script>
// ROUND POINTS
function getRoundPoints(gameId){
let num = parseInt(gameId.replace("g",""));
if(num <= 32) return 1;
if(num <= 48) return 2;
if(num <= 56) return 4;
if(num <= 60) return 8;
if(num <= 62) return 12;
return 16;
}
// SEED BONUS
function getSeedBonus(seed){
if(seed === 9 || seed === 10) return 1;
if(seed === 11 || seed === 12) return 2;
if(seed === 13 || seed === 14) return 3;
if(seed === 15) return 4;
if(seed === 16) return 5;
return 0;
}
// ORDINAL
function ordinal(n){
if(n===1) return "1st";
if(n===2) return "2nd";
if(n===3) return "3rd";
return n + "th";
}
async function loadScenarios(){
const results = await (await fetch("results.json")).json();
// ✅ safe games fetch
let games = {};
try{
games = await (await fetch("games.json")).json();
}catch(e){
console.warn("No games.json yet");
}
const entries = await (await fetch("https://script.google.com/macros/s/AKfycbxFl2X-PoaGAngDB8NGtPT20mnS15KK47MDTDSD_-n6SnB32CnCxEZWoTi8hl_uiHbE/exec")).json();
let players = [];
// INIT PLAYERS
entries.forEach(entry => {
players.push({
name: entry.name,
picks: entry.picks,
top5: 0,
teamImpact: {}
});
});
// REMAINING GAMES
let remainingGames = Object.keys(games).filter(g => !results[g]);
// ⚠️ prevent crash if empty
let totalScenarios = remainingGames.length ? (1 << remainingGames.length) : 0;
// SIMULATE
for(let mask = 0; mask < totalScenarios; mask++){
let simResults = {...results};
// BUILD SCENARIO
remainingGames.forEach((game, i)=>{
let matchup = games[game] || [];
let teamA = matchup[0];
let teamB = matchup[1];
// skip if invalid
if(!teamA || !teamB) return;
simResults[game] = (mask & (1<<i)) ? teamA : teamB;
});
// SCORE
let scores = players.map(p => {
let score = 0;
for(let game in p.picks){
let pick = p.picks[game];
let winner = simResults[game];
if(pick && winner && pick === winner){
score += getRoundPoints(game);
let seed = parseInt(winner.split(" ")[0]) || 0;
if(seed) score += getSeedBonus(seed);
}
}
return {name: p.name, score};
});
// SORT
scores.sort((a,b)=>b.score-a.score);
// TOP 5
let top5Names = scores.slice(0,5).map(s=>s.name);
// TRACK
players.forEach(p=>{
if(top5Names.includes(p.name)){
p.top5++;
}
});
// TEAM IMPACT
remainingGames.forEach(game=>{
let winner = simResults[game];
if(!winner) return;
players.forEach(p=>{
if(top5Names.includes(p.name)){
if(!p.teamImpact[winner]) p.teamImpact[winner]=0;
p.teamImpact[winner]++;
}
});
});
}
// BUILD ROOT FOR
players.forEach(p=>{
let teams = Object.entries(p.teamImpact)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);
p.rootFor = teams.map(([team,count])=>{
return `${team} (${count})`;
});
});
// BASE SCORING
players.forEach(p=>{
let current = 0;
let max = 0;
let alive = false;
for(let game in p.picks){
let pick = p.picks[game];
let winner = results[game];
if(winner && pick === winner){
current += getRoundPoints(game);
let seed = parseInt(winner.split(" ")[0]) || 0;
if(seed) current += getSeedBonus(seed);
}
if(!winner){
max += getRoundPoints(game);
let seed = parseInt(pick?.split(" ")[0]) || 0;
if(seed) max += getSeedBonus(seed);
alive = true;
}
else if(pick === winner){
max += getRoundPoints(game);
let seed = parseInt(winner.split(" ")[0]) || 0;
if(seed) max += getSeedBonus(seed);
alive = true;
}
}
p.current = current;
p.max = max;
p.alive = alive;
p.champion = p.picks["g63"] || "";
});
// SORT
players.sort((a,b)=>b.current-a.current);
players.forEach((p,i)=> p.rank = i+1);
// BEST FINISH
players.forEach(player=>{
let better=0;
players.forEach(other=>{
if(other!==player && other.current > player.max){
better++;
}
});
player.bestFinish = better+1;
});
// RENDER
const tbody = document.querySelector("#scenarioTable tbody");
tbody.innerHTML = "";
players.forEach(p=>{
let row = document.createElement("tr");
row.innerHTML = `
<td class="rank">${p.rank}</td>
<td>${p.name}</td>
<td>${p.current}</td>
<td>${p.max}</td>
<td>${ordinal(p.bestFinish)}</td>
<td>${p.champion}</td>
<td class="${p.alive ? 'alive' : 'eliminated'}">
${p.alive ? 'YES' : 'NO'}
</td>
<td style="font-size:12px">
${p.rootFor.join(", ")}
<br><b>${p.top5} total top-5 paths</b>
</td>
`;
tbody.appendChild(row);
});
// TIMESTAMP
document.getElementById("timestamp").innerText =
new Date().toLocaleString();
}
loadScenarios();
</script>
</body>
</html>
