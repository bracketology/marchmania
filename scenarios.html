<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Scenarios</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
text-align:center;
}
.navbar{
background:#222;
padding:12px;
display:flex;
justify-content:center;
gap:25px;
}
.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}
h1{
margin-top:25px;
}
.container{
max-width:1300px;
margin:auto;
padding:20px;
}
table{
width:100%;
border-collapse:collapse;
background:white;
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
}
th{
background:#333;
color:white;
cursor:pointer;
}
.rank{
font-weight:bold;
}
.alive{
color:green;
font-weight:bold;
}
.eliminated{
color:red;
font-weight:bold;
}
.update{
margin-top:15px;
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="bracket.html">Bracket</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="rules.html">Rules</a>
<a href="scenarios.html">Scenarios</a>
</div>

<h1>Player Scenarios</h1>

<div class="container">
<table id="scenarioTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Current Points</th>
<th>Total Possible</th>
<th>Champion Pick</th>
<th>Still Alive</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="update">
Last Updated: <span id="timestamp"></span>
</div>
</div>

<script>

// ROUND POINTS
function getRoundPoints(gameId){
let num = parseInt(gameId.replace("g",""));

if(num <= 32) return 1;
if(num <= 48) return 2;
if(num <= 56) return 4;
if(num <= 60) return 8;
if(num <= 62) return 12;
return 16;
}

// SEED BONUS
function getSeedBonus(seed){
if(seed === 9 || seed === 10) return 1;
if(seed === 11 || seed === 12) return 2;
if(seed === 13 || seed === 14) return 3;
if(seed === 15) return 4;
if(seed === 16) return 5;
return 0;
}

async function loadScenarios(){

const results = await (await fetch("results.json")).json();
const entries = await (await fetch("entries.json")).json();
const seeds = await (await fetch("seeds.json")).json();

let players = [];

entries.forEach(entry => {

let current = 0;
let max = 0;
let alive = false;

// loop through picks
for(let game in entry.picks){

let pick = entry.picks[game];
let winner = results[game];

// CURRENT SCORE
if(winner && pick === winner){
current += getRoundPoints(game);
let seed = seeds[winner];
if(seed) current += getSeedBonus(seed);
}

// MAX POSSIBLE
if(!winner){ // game not played yet
max += getRoundPoints(game);
let seed = seeds[pick];
if(seed) max += getSeedBonus(seed);
alive = true;
}
else if(pick === winner){ // already correct
max += getRoundPoints(game);
let seed = seeds[winner];
if(seed) max += getSeedBonus(seed);
alive = true;
}

}

// champion pick = g63
let championPick = entry.picks["g63"] || "";

// FINAL STATUS
if(max === current){
alive = false;
}

// store
players.push({
name: entry.name,
current: current,
max: max,
champion: championPick,
alive: alive
});

});

// SORT BY CURRENT SCORE
players.sort((a,b) => b.current - a.current);

// RENDER
const tbody = document.querySelector("#scenarioTable tbody");
tbody.innerHTML = "";

players.forEach((p, index) => {

let row = document.createElement("tr");

row.innerHTML = `
<td class="rank">${index + 1}</td>
<td>${p.name}</td>
<td>${p.current}</td>
<td>${p.max}</td>
<td>${p.champion}</td>
<td class="${p.alive ? 'alive' : 'eliminated'}">
${p.alive ? 'YES' : 'NO'}
</td>
`;

tbody.appendChild(row);

});

// TIMESTAMP
document.getElementById("timestamp").innerText =
new Date().toLocaleString();

}

loadScenarios();

</script>

</body>
</html>
